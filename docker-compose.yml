services:
  postgres:
    image: postgres:16-alpine
    container_name: almoxarifado-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-almoxarifado}
      POSTGRES_USER: ${POSTGRES_USER:-almoxarifado}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-almoxarifado}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - almoxarifado_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-almoxarifado} -d ${POSTGRES_DB:-almoxarifado}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  almoxarifado_postgres_data:
